# =============================================================================
# Comics Hub GraphQL Schema
# =============================================================================
# This schema exposes all functionality from the REST API in a GraphQL interface.
# Authentication is handled via JWT tokens passed in the Authorization header.
# =============================================================================

# -----------------------------------------------------------------------------
# Custom Scalars
# -----------------------------------------------------------------------------
scalar Date
scalar DateTime
scalar JSON

# -----------------------------------------------------------------------------
# Directives for Authorization
# -----------------------------------------------------------------------------
"""
Marks a field or type as requiring authentication.
The request must include a valid JWT token in the Authorization header.
"""
directive @authenticated on FIELD_DEFINITION

"""
Marks a field as requiring a specific role.
"""
directive @hasRole(role: String!) on FIELD_DEFINITION

"""
Marks a field as intentionally public (no authentication required).
"""
directive @public on FIELD_DEFINITION

# -----------------------------------------------------------------------------
# Root Query Type
# -----------------------------------------------------------------------------
type Query {
    # =========================================================================
    # Comics
    # =========================================================================

    """
    Get comics with optional search, filtering, and pagination.
    Supports cursor-based pagination for efficient large archive handling.
    """
    comics(
        """Search query to filter comics by name or author."""
        search: String
        """Filter by active status (actively publishing)."""
        active: Boolean
        """Filter by enabled status."""
        enabled: Boolean
        """Number of comics to return (max 50)."""
        first: Int = 20
        """Cursor for pagination - return comics after this cursor."""
        after: String
    ): ComicConnection! @authenticated

    """
    Get a specific comic by its ID.
    """
    comic(id: Int!): Comic @authenticated

    """
    Get a comic strip directly by comic ID and date.
    More efficient than querying comic.strip when you only need the strip.
    """
    strip(comicId: Int!, date: Date!): ComicStrip @authenticated

    """
    Get a random comic strip.
    If comicId is provided, returns a random strip from that comic.
    If comicId is null, picks a random comic and random date.
    """
    randomStrip(comicId: Int): ComicStrip @authenticated

    # =========================================================================
    # Search
    # =========================================================================

    """
    Full-text search across comics.
    Searches comic names, authors, and descriptions.
    """
    search(
        """Search query string."""
        query: String!
        """Maximum number of results to return."""
        limit: Int = 20
    ): SearchResults! @authenticated

    # =========================================================================
    # Authentication
    # =========================================================================

    """
    Validate the current JWT token from Authorization header.
    Returns true if the token is valid, false otherwise.
    """
    validateToken: Boolean! @public

    # =========================================================================
    # User & Preferences (Authenticated)
    # =========================================================================

    """
    Get the current authenticated user's profile.
    Requires authentication.
    """
    me: User @authenticated

    """
    Get the current authenticated user's preferences.
    Requires authentication.
    """
    preferences: UserPreference @authenticated

    # =========================================================================
    # Health & System Status
    # =========================================================================

    """
    Get the health status of the application.
    """
    health(detailed: Boolean = false): HealthStatus! @public

    # =========================================================================
    # Metrics
    # =========================================================================

    """
    Get storage metrics for the comic cache.
    """
    storageMetrics: StorageMetrics @hasRole(role: "OPERATOR")

    """
    Get access metrics for all comics.
    """
    accessMetrics: AccessMetrics @hasRole(role: "OPERATOR")

    """
    Get combined storage and access metrics.
    """
    combinedMetrics: CombinedMetrics @hasRole(role: "OPERATOR")

    # =========================================================================
    # Retrieval Status
    # =========================================================================

    """
    Get retrieval records with optional filtering.
    Returns records from the last 7 days.
    """
    retrievalRecords(
        comicName: String
        status: RetrievalStatusEnum
        fromDate: Date
        toDate: Date
        limit: Int = 100
    ): [RetrievalRecord!]! @hasRole(role: "OPERATOR")

    """
    Get a specific retrieval record by ID.
    """
    retrievalRecord(id: String!): RetrievalRecord @hasRole(role: "OPERATOR")

    """
    Get summary statistics of retrieval operations.
    """
    retrievalSummary(fromDate: Date, toDate: Date): RetrievalSummary! @hasRole(role: "OPERATOR")

    """
    Get retrieval records for a specific comic.
    """
    retrievalRecordsForComic(comicName: String!, limit: Int = 20): [RetrievalRecord!]! @hasRole(role: "OPERATOR")

    # =========================================================================
    # Batch Jobs
    # =========================================================================

    """
    Get recent batch job executions.
    """
    recentBatchJobs(count: Int = 10): [BatchJob!]! @hasRole(role: "OPERATOR")

    """
    Get batch jobs within a date range.
    """
    batchJobsByDateRange(startDate: Date!, endDate: Date!): [BatchJob!]! @hasRole(role: "OPERATOR")

    """
    Get a specific batch job execution by ID.
    """
    batchJob(executionId: Int!): BatchJob @hasRole(role: "OPERATOR")

    """
    Get summary statistics for batch jobs.
    """
    batchJobSummary(days: Int = 7): BatchJobSummary! @hasRole(role: "OPERATOR")

    """
    Get scheduler info for all batch jobs, including pause state.
    """
    batchSchedulers: [BatchSchedulerInfo!]! @hasRole(role: "OPERATOR")

    """
    Get the execution log for a specific batch job run.
    """
    batchJobLog(executionId: Int!, jobName: String!): String @hasRole(role: "OPERATOR")

    # =========================================================================
    # Error Codes (Metadata)
    # =========================================================================

    """
    Get a list of all known error codes.
    """
    errorCodes: [ErrorCode!]! @public
}

# -----------------------------------------------------------------------------
# Root Mutation Type
# -----------------------------------------------------------------------------
type Mutation {
    # =========================================================================
    # Authentication
    # =========================================================================

    """
    Register a new user account.
    Returns authentication payload with JWT token on success.
    """
    register(input: RegisterInput!): AuthPayload! @public

    """
    Authenticate with username and password.
    Returns authentication payload with JWT token on success.
    """
    login(input: LoginInput!): AuthPayload! @public

    """
    Refresh an expired JWT token using a refresh token.
    """
    refreshToken(refreshToken: String!): AuthPayload! @public

    """
    Request a password reset email.
    Returns true if the email was sent (always returns true to prevent email enumeration).
    """
    forgotPassword(email: String!): Boolean! @public

    """
    Reset password using a token from the password reset email.
    """
    resetPassword(token: String!, newPassword: String!): AuthPayload! @public

    # =========================================================================
    # User Management (Authenticated)
    # =========================================================================

    """
    Update the current user's profile.
    Requires authentication.
    """
    updateProfile(input: UpdateProfileInput!): UpdateProfilePayload! @authenticated

    """
    Update the current user's password.
    Requires authentication.
    """
    updatePassword(newPassword: String!): UpdatePasswordPayload! @authenticated

    """
    Delete a user account (admin only).
    This action is irreversible.
    Requires admin role.
    """
    deleteAccount(username: String!): DeleteAccountPayload! @hasRole(role: "ADMIN")

    # =========================================================================
    # Preferences (Authenticated)
    # =========================================================================

    """
    Add a comic to the user's favorites.
    Requires authentication.
    """
    addFavorite(comicId: Int!): FavoritePayload! @authenticated

    """
    Remove a comic from the user's favorites.
    Requires authentication.
    """
    removeFavorite(comicId: Int!): FavoritePayload! @authenticated

    """
    Update the last read date for a comic.
    Requires authentication.
    """
    updateLastRead(comicId: Int!, date: Date!): UpdateLastReadPayload! @authenticated

    """
    Update display settings (theme, layout, etc.).
    Requires authentication.
    """
    updateDisplaySettings(settings: JSON!): UpdateDisplaySettingsPayload! @authenticated

    # =========================================================================
    # Comic Management (Admin)
    # =========================================================================

    """
    Create a new comic entry.
    Requires admin role.
    """
    createComic(input: CreateComicInput!): CreateComicPayload! @hasRole(role: "ADMIN")

    """
    Update an existing comic's details.
    Requires admin role.
    """
    updateComic(id: Int!, input: UpdateComicInput!): UpdateComicPayload! @hasRole(role: "ADMIN")

    """
    Delete a comic and its cached strips.
    Requires admin role.
    """
    deleteComic(id: Int!): DeleteComicPayload! @hasRole(role: "ADMIN")

    # =========================================================================
    # Metrics (Admin)
    # =========================================================================

    """
    Force a refresh of storage metrics.
    """
    refreshStorageMetrics: RefreshStorageMetricsPayload! @hasRole(role: "ADMIN")

    """
    Force a refresh of all metrics (storage, access, combined).
    """
    refreshAllMetrics: RefreshAllMetricsPayload! @hasRole(role: "ADMIN")

    # =========================================================================
    # Retrieval Status (Admin)
    # =========================================================================

    """
    Delete a specific retrieval record.
    """
    deleteRetrievalRecord(id: String!): DeleteRetrievalRecordPayload! @hasRole(role: "ADMIN")

    """
    Purge retrieval records older than specified days.
    Returns the number of records purged.
    """
    purgeRetrievalRecords(daysToKeep: Int = 7): PurgeRetrievalRecordsPayload! @hasRole(role: "ADMIN")

    # =========================================================================
    # Batch Jobs (Admin)
    # =========================================================================

    """
    Trigger a batch job for comic retrieval.
    """
    triggerBatchJob: TriggerBatchJobPayload! @hasRole(role: "ADMIN")

    """
    Trigger a backfill job to retrieve missing comics.
    """
    triggerBackfillJob: TriggerBatchJobPayload! @hasRole(role: "ADMIN")

    """
    Trigger any batch job by name.
    """
    triggerJob(jobName: String!): TriggerBatchJobPayload! @hasRole(role: "ADMIN")

    """
    Pause or resume a batch job scheduler.
    """
    toggleJobScheduler(jobName: String!, paused: Boolean!): ToggleJobSchedulerPayload! @hasRole(role: "ADMIN")
}
