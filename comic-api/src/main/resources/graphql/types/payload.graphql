# =============================================================================
# Mutation Payload Types
# =============================================================================
# Standard Relay-style mutation payloads with result object and user errors.
# =============================================================================

"""
A user-facing error from a mutation.
"""
type UserError {
    """
    Error message.
    """
    message: String!

    """
    Field path that caused the error (e.g., "input.email").
    """
    field: String

    """
    Machine-readable error code.
    """
    code: ErrorCode
}

# =============================================================================
# Comic Mutation Payloads
# =============================================================================

"""
Payload for createComic mutation.
"""
type CreateComicPayload {
    """
    The created comic, or null if errors occurred.
    """
    comic: Comic

    """
    List of user-facing errors.
    """
    errors: [UserError!]!
}

"""
Payload for updateComic mutation.
"""
type UpdateComicPayload {
    """
    The updated comic, or null if errors occurred.
    """
    comic: Comic

    """
    List of user-facing errors.
    """
    errors: [UserError!]!
}

"""
Payload for deleteComic mutation.
"""
type DeleteComicPayload {
    """
    Whether the deletion was successful.
    """
    success: Boolean!

    """
    List of user-facing errors.
    """
    errors: [UserError!]!
}

