name: Comic Hub CI

on:
  push:
    branches: [ "master" ]
    paths:
      - 'comic-hub/**'
      - '.github/workflows/angular.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'comic-hub/**'
      - '.github/workflows/angular.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: comic-hub

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: comic-hub/.nvmrc
        cache: 'npm'
        cache-dependency-path: comic-hub/package-lock.json

    - name: Pin npm
      # npm 10.9.x has a worker thread bug on Ubuntu runners that fires
      # 'Exit handler never called!' (npm/cli#8336). Pin to the last 10.8.x
      # release until the upstream fix lands in a Node 22 LTS update.
      run: npm install -g npm@10.8.3

    - name: Install dependencies
      run: npm ci

    - name: Run tests with coverage
      run: npx vitest run --coverage

    - name: Build production
      run: npm run build
      env:
        NEXT_PUBLIC_GRAPHQL_ENDPOINT: http://10.0.0.47:8087/graphql
