name: Comic Hub CI

on:
  push:
    branches: [ "master" ]
    paths:
      - 'comic-hub/**'
      - '.github/workflows/angular.yml'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'comic-hub/**'
      - '.github/workflows/angular.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: comic-hub

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: comic-hub/.nvmrc
        cache: 'npm'
        cache-dependency-path: comic-hub/package-lock.json

    - name: Install dependencies
      # --no-audit / --no-fund work around npm/cli#8336 (Exit handler never called)
      # which fires when npm's audit/fund worker thread races with deprecation warnings.
      run: npm ci --no-audit --no-fund

    - name: Run tests with coverage
      run: npx vitest run --coverage

    - name: Build production
      run: npm run build
      env:
        NEXT_PUBLIC_GRAPHQL_ENDPOINT: http://10.0.0.47:8087/graphql
