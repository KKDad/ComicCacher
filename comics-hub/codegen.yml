schema: 'http://10.0.0.47:8087/graphql'
documents: 'src/**/*.graphql'
generates:
  src/generated/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-react-query
    config:
      fetcher:
        endpoint: 'http://10.0.0.47:8087/graphql'
        fetchParams:
          headers:
            Content-Type: application/json
